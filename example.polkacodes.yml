#============================================================================
# File Exclusions
#============================================================================
# Patterns to exclude from AI operations
# Supports glob patterns

excludeFiles:
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - ".git/**"
  - "*.log"
  - ".env"
  - ".env.*"
  - "coverage/**"
  - ".next/**"
  - ".turbo/**"
  - "*.min.js"
  - "*.min.css"
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"

#============================================================================
# Project Instructions Files
#============================================================================
# Control auto-loading of project instruction files
# All default to true (enabled) for backward compatibility

loadRules:
  # Load AGENTS.md if present in project directory
  AGENTS.md: true

  # Load CLAUDE.md if present in project directory
  CLAUDE.md: true
