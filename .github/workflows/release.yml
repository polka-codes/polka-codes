name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Expected version already merged on master
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure release runs from master
        run: |
          if [ "${{ github.ref_name }}" != "master" ]; then
            echo "Release workflow must run from master, got ${{ github.ref_name }}."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm
        run: npm install --global npm@11

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture release version
        id: version
        run: echo "release_version=$(jq -r '.version' packages/core/package.json)" >> "$GITHUB_OUTPUT"

      - name: Validate release version
        run: |
          if [ "${{ steps.version.outputs.release_version }}" != "${{ inputs.version }}" ]; then
            echo "Release version mismatch: repo has ${{ steps.version.outputs.release_version }}, expected ${{ inputs.version }}."
            exit 1
          fi

      - name: Validate release state
        run: bun check

      - name: Build packages
        run: bun run build

      - name: Publish packages
        run: bun run scripts/publish.ts
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Push release tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.release_version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.release_version }} already exists; skipping."
            exit 0
          fi

          git tag "v${{ steps.version.outputs.release_version }}"
          git push origin "v${{ steps.version.outputs.release_version }}"

      - name: Create GitHub release
        run: |
          if gh release view "v${{ steps.version.outputs.release_version }}" >/dev/null 2>&1; then
            echo "GitHub release v${{ steps.version.outputs.release_version }} already exists; skipping."
            exit 0
          fi

          gh release create "v${{ steps.version.outputs.release_version }}" --generate-notes --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
