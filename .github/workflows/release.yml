name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Exact version to release; overrides bump when provided
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.commit.outputs.release_sha }}
      release_version: ${{ steps.version.outputs.release_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm
        run: npm install --global npm@11

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release state
        run: |
          bun check
          bun test

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare release version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            bun run scripts/release.ts --version "${{ inputs.version }}"
          else
            bun run scripts/release.ts --bump "${{ inputs.bump }}"
          fi

      - name: Capture release version
        id: version
        run: echo "release_version=$(jq -r '.version' packages/core/package.json)" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        id: commit
        run: |
          if git diff --quiet -- packages/*/package.json; then
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add packages/*/package.json
          git commit -m "chore: release ${{ steps.version.outputs.release_version }}"
          git push origin HEAD:master
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm
        run: npm install --global npm@11

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Publish packages
        run: bun run scripts/publish.ts
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Push release tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ needs.prepare.outputs.release_version }}" >/dev/null 2>&1; then
            echo "Tag v${{ needs.prepare.outputs.release_version }} already exists; skipping."
            exit 0
          fi

          git tag "v${{ needs.prepare.outputs.release_version }}"
          git push origin "v${{ needs.prepare.outputs.release_version }}"

      - name: Create GitHub release
        run: |
          if gh release view "v${{ needs.prepare.outputs.release_version }}" >/dev/null 2>&1; then
            echo "GitHub release v${{ needs.prepare.outputs.release_version }} already exists; skipping."
            exit 0
          fi

          gh release create "v${{ needs.prepare.outputs.release_version }}" --generate-notes --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
